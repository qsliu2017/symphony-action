name: Symphony Action
description: Autonomous GitHub issue implementation using Claude Code
author: qsliu2017

branding:
  icon: music
  color: purple

inputs:
  phrase:
    description: "'dispatch' — implement an issue; 'review' — review a PR; 'find' — find open issues and dispatch workers"
    required: true
  issue_number:
    description: "GitHub issue number (dispatch mode)"
    required: false
    default: ""
  pr_number:
    description: "GitHub PR number (review mode)"
    required: false
    default: ""
  attempt:
    description: "Retry attempt number (dispatch mode)"
    required: false
    default: "0"
  workflow_file:
    description: "Path to WORKFLOW.md in the repo"
    required: false
    default: "WORKFLOW.md"
  dispatch_workflow:
    description: "Workflow file to call per issue (find mode) or on retry (dispatch mode). Must accept issue_number and attempt inputs."
    required: false
    default: ""
  review_workflow:
    description: "Workflow file to trigger for review when GH_PAT is not set (dispatch mode). Must accept pr_number input."
    required: false
    default: ""

# Secrets are passed via env: on the calling step:
#   ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN  — for Claude Code CLI
#   GH_PAT                                         — optional, makes PRs trigger CI

runs:
  using: composite
  steps:

    # ══════════════════════════════════════════════════════════════════════════
    # SETUP
    # review must fetch PR info before checkout to know which branch to check out
    # ══════════════════════════════════════════════════════════════════════════

    - name: Fetch PR info
      if: inputs.phrase == 'review'
      id: pr_info
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_JSON=$(gh pr view "${{ inputs.pr_number }}" \
          --repo "${{ github.repository }}" \
          --json number,title,headRefName,body,closingIssuesReferences)
        echo "json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$PR_JSON" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['headRefName'])")
        echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        ISSUE_NUM=$(echo "$PR_JSON" | python3 -c \
          'import sys,json; d=json.load(sys.stdin); refs=d.get("closingIssuesReferences",[]); print(refs[0]["number"] if refs else "")')
        echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

    - name: Checkout default branch
      if: inputs.phrase == 'dispatch'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ github.token }}

    - name: Checkout PR branch
      if: inputs.phrase == 'review'
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr_info.outputs.branch }}
        fetch-depth: 0
        token: ${{ github.token }}

    - name: Install Claude Code CLI
      if: inputs.phrase == 'dispatch' || inputs.phrase == 'review'
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Parse WORKFLOW.md
      if: inputs.phrase == 'dispatch' || inputs.phrase == 'review'
      id: config
      shell: bash
      run: |
        WORKFLOW_FILE="${{ inputs.workflow_file }}"
        SCRIPTS_DIR="${GITHUB_ACTION_PATH}/scripts"
        chmod +x "$SCRIPTS_DIR"/*.sh
        if [[ ! -f "$WORKFLOW_FILE" ]]; then
          echo "WARNING: $WORKFLOW_FILE not found, using defaults" >&2
          echo "max_turns=20" >> "$GITHUB_OUTPUT"
          echo "claude_command=claude" >> "$GITHUB_OUTPUT"
          echo "claude_model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
          echo "complexity_threshold=auto" >> "$GITHUB_OUTPUT"
          echo "hook_before_run=" >> "$GITHUB_OUTPUT"
          echo "hook_after_run=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        eval "$(bash "$SCRIPTS_DIR/parse-workflow.sh" "$WORKFLOW_FILE")"
        echo "max_turns=${SYMPHONY_MAX_TURNS}" >> "$GITHUB_OUTPUT"
        echo "claude_command=${SYMPHONY_CLAUDE_COMMAND}" >> "$GITHUB_OUTPUT"
        echo "claude_model=${SYMPHONY_CLAUDE_MODEL}" >> "$GITHUB_OUTPUT"
        echo "complexity_threshold=${SYMPHONY_COMPLEXITY_THRESHOLD}" >> "$GITHUB_OUTPUT"
        {
          echo "hook_before_run<<EOF_HOOK"
          echo "${SYMPHONY_HOOK_BEFORE_RUN}"
          echo "EOF_HOOK"
        } >> "$GITHUB_OUTPUT"
        {
          echo "hook_after_run<<EOF_HOOK"
          echo "${SYMPHONY_HOOK_AFTER_RUN}"
          echo "EOF_HOOK"
        } >> "$GITHUB_OUTPUT"
        {
          echo "prompt_template<<EOF_PROMPT"
          echo "${SYMPHONY_PROMPT_TEMPLATE}"
          echo "EOF_PROMPT"
        } >> "$GITHUB_OUTPUT"

    # ══════════════════════════════════════════════════════════════════════════
    # DISPATCH — implement one issue
    # ══════════════════════════════════════════════════════════════════════════

    - name: Label issue in-progress
      if: inputs.phrase == 'dispatch'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ISSUE="${{ inputs.issue_number }}"
        gh issue edit "$ISSUE" --add-label "symphony:claimed" \
          --repo "${{ github.repository }}" || true
        sleep 2
        gh issue edit "$ISSUE" --add-label "symphony:in-progress" \
          --remove-label "symphony:claimed" --remove-label "symphony:todo" \
          --repo "${{ github.repository }}" || true

    - name: Fetch issue details
      if: inputs.phrase == 'dispatch'
      id: issue
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ISSUE_JSON=$(gh issue view "${{ inputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --json number,title,body,labels,url)
        echo "json<<EOF_JSON" >> "$GITHUB_OUTPUT"
        echo "$ISSUE_JSON" >> "$GITHUB_OUTPUT"
        echo "EOF_JSON" >> "$GITHUB_OUTPUT"
        TITLE=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
        echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

    - name: Run before_run hook
      if: inputs.phrase == 'dispatch' && steps.config.outputs.hook_before_run != ''
      shell: bash
      run: bash -c "${{ steps.config.outputs.hook_before_run }}"

    - name: Assess issue complexity
      if: inputs.phrase == 'dispatch'
      id: plan
      shell: bash
      env:
        ISSUE_JSON: ${{ steps.issue.outputs.json }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        SYMPHONY_COMPLEXITY_THRESHOLD: ${{ steps.config.outputs.complexity_threshold }}
        SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
        SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
        GH_TOKEN: ${{ github.token }}
      run: |
        PLAN=$(bash "${GITHUB_ACTION_PATH}/scripts/assess-and-plan.sh")
        echo "result<<EOF_PLAN" >> "$GITHUB_OUTPUT"
        echo "$PLAN" >> "$GITHUB_OUTPUT"
        echo "EOF_PLAN" >> "$GITHUB_OUTPUT"
        IS_COMPLEX=$(echo "$PLAN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('complex',False)).lower())")
        echo "complex=${IS_COMPLEX}" >> "$GITHUB_OUTPUT"

    - name: Create sub-issues if complex
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PLAN='${{ steps.plan.outputs.result }}'
        PARENT="${{ inputs.issue_number }}"
        REPO="${{ github.repository }}"

        python3 -c "
import sys, json, subprocess
plan = json.loads(sys.argv[1])
parent = sys.argv[2]
repo = sys.argv[3]
sub_issues = plan.get('sub_issues', [])
if not sub_issues:
    print('No sub-issues to create')
    sys.exit(0)
created = []
for sub in sub_issues:
    result = subprocess.run(
        ['gh', 'issue', 'create', '--repo', repo,
         '--title', sub['title'],
         '--body', sub['body'] + '\n\nPart of #' + parent,
         '--label', 'symphony:todo'],
        capture_output=True, text=True, check=True
    )
    issue_url = result.stdout.strip()
    issue_num = issue_url.rstrip('/').split('/')[-1]
    created.append((issue_num, sub['title']))
    print(f'Created sub-issue #{issue_num}: {sub[\"title\"]}')
task_list = '\n\n## Sub-issues\n\n' + '\n'.join(
    f'- [ ] #{num} {title}' for num, title in created
)
subprocess.run(
    ['gh', 'issue', 'comment', parent, '--repo', repo,
     '--body', f'Symphony broke this issue into sub-tasks:{task_list}'],
    check=True
)
" "$PLAN" "$PARENT" "$REPO"

        gh issue edit "$PARENT" \
          --add-label "symphony:todo" \
          --remove-label "symphony:in-progress" \
          --repo "$REPO" || true

    - name: Create/checkout feature branch
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false'
      shell: bash
      run: |
        BRANCH="symphony/issue-${{ inputs.issue_number }}"
        git config user.name "Symphony Bot"
        git config user.email "symphony-bot@users.noreply.github.com"
        git checkout -B "$BRANCH"
        git push -u origin "$BRANCH" --force-with-lease || git push -u origin "$BRANCH"

    - name: Implement issue with Claude
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false'
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        ISSUE_JSON: ${{ steps.issue.outputs.json }}
        ATTEMPT: ${{ inputs.attempt }}
        SYMPHONY_PROMPT_TEMPLATE: ${{ steps.config.outputs.prompt_template }}
        SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
        SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
      run: bash "${GITHUB_ACTION_PATH}/scripts/implement-issue.sh"

    - name: Run after_run hook
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.config.outputs.hook_after_run != ''
      shell: bash
      run: bash -c "${{ steps.config.outputs.hook_after_run }}"

    - name: Check for changes
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false'
      id: changes
      shell: bash
      run: |
        if [[ -z "$(git status --porcelain)" ]]; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed files:" >&2
          git status --porcelain >&2
        fi

    - name: Commit and push changes
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        git add -A
        git commit -m "feat: implement issue #${{ inputs.issue_number }} - ${{ steps.issue.outputs.title }}"
        git push

    - name: Create pull request
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_PAT || github.token }}
      run: |
        BRANCH="symphony/issue-${{ inputs.issue_number }}"
        TITLE="feat: ${{ steps.issue.outputs.title }}"
        BODY="Resolves #${{ inputs.issue_number }}

Implemented by Symphony via Claude Code.

---
*This PR was automatically created by [Symphony](https://github.com/${{ github.repository }}).*"

        PR_URL=$(gh pr create \
          --repo "${{ github.repository }}" \
          --head "$BRANCH" \
          --base "main" \
          --title "$TITLE" \
          --body "$BODY") || \
        PR_URL=$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --json url -q .url)

        echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
        PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "")
        echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

        # If no PAT: CI won't auto-trigger; dispatch review directly if configured
        if [[ -z "${{ env.GH_PAT }}" && -n "${{ inputs.review_workflow }}" ]]; then
          echo "No GH_PAT — dispatching review after 30s..." >&2
          sleep 30
          gh workflow run "${{ inputs.review_workflow }}" \
            --repo "${{ github.repository }}" \
            --field pr_number="${PR_NUM}" \
            --field workflow_file="${{ inputs.workflow_file }}" || true
        fi

    - name: Comment on issue with PR link
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue comment "${{ inputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --body "Symphony has opened a pull request: ${{ steps.pr.outputs.url }}"

    - name: Label issue pr-open
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue edit "${{ inputs.issue_number }}" \
          --add-label "symphony:pr-open" \
          --remove-label "symphony:in-progress" \
          --repo "${{ github.repository }}" || true

    - name: Retry or give up if no changes
      if: inputs.phrase == 'dispatch' && steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ATTEMPT="${{ inputs.attempt }}"
        MAX_TURNS="${{ steps.config.outputs.max_turns }}"
        MAX_TURNS="${MAX_TURNS:-5}"
        NEXT_ATTEMPT=$((ATTEMPT + 1))
        if [[ "$NEXT_ATTEMPT" -lt "$MAX_TURNS" ]]; then
          echo "No changes on attempt ${ATTEMPT}, retrying (${NEXT_ATTEMPT}/${MAX_TURNS})" >&2
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Symphony made no changes on attempt ${ATTEMPT} — retrying (attempt ${NEXT_ATTEMPT})."
          gh issue edit "${{ inputs.issue_number }}" \
            --remove-label "symphony:in-progress" \
            --repo "${{ github.repository }}" || true
          DISPATCH_WF="${{ inputs.dispatch_workflow }}"
          if [[ -n "$DISPATCH_WF" ]]; then
            gh workflow run "$DISPATCH_WF" \
              --repo "${{ github.repository }}" \
              --field issue_number="${{ inputs.issue_number }}" \
              --field attempt="${NEXT_ATTEMPT}" \
              --field workflow_file="${{ inputs.workflow_file }}"
          else
            echo "No dispatch_workflow set — cannot auto-retry. Re-trigger manually." >&2
          fi
        else
          echo "Giving up after ${MAX_TURNS} attempts" >&2
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Symphony made no changes after ${MAX_TURNS} attempts — marking as failed for human review."
          gh issue edit "${{ inputs.issue_number }}" \
            --add-label "symphony:failed" \
            --remove-label "symphony:in-progress" \
            --repo "${{ github.repository }}" || true
        fi

    # ���═════════════════════════════════════════════════════════════════════════
    # REVIEW — review a PR, apply fixes, merge
    # ══════════════════════════════════════════════════════════════════════════

    - name: Fetch linked issue details
      if: inputs.phrase == 'review' && steps.pr_info.outputs.issue_number != ''
      id: review_issue
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ISSUE_JSON=$(gh issue view "${{ steps.pr_info.outputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --json number,title,body,labels || echo "{}")
        echo "json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$ISSUE_JSON" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Label issue reviewing
      if: inputs.phrase == 'review' && steps.pr_info.outputs.issue_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue edit "${{ steps.pr_info.outputs.issue_number }}" \
          --add-label "symphony:reviewing" \
          --remove-label "symphony:pr-open" \
          --repo "${{ github.repository }}" || true

    - name: Configure git
      if: inputs.phrase == 'review'
      shell: bash
      run: |
        git config user.name "Symphony Bot"
        git config user.email "symphony-bot@users.noreply.github.com"

    - name: Run review
      if: inputs.phrase == 'review'
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
        ISSUE_JSON: ${{ steps.review_issue.outputs.json || '{}' }}
        SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
        SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
        SYMPHONY_MAX_TURNS: ${{ steps.config.outputs.max_turns }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        GH_TOKEN: ${{ github.token }}
      run: bash "${GITHUB_ACTION_PATH}/scripts/review-pr.sh"

    - name: Merge PR
      if: inputs.phrase == 'review'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr merge "${{ inputs.pr_number }}" \
          --repo "${{ github.repository }}" \
          --squash \
          --delete-branch \
          --auto || \
        gh pr merge "${{ inputs.pr_number }}" \
          --repo "${{ github.repository }}" \
          --squash \
          --delete-branch

    - name: Label issue done
      if: inputs.phrase == 'review' && steps.pr_info.outputs.issue_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue edit "${{ steps.pr_info.outputs.issue_number }}" \
          --add-label "symphony:done" \
          --remove-label "symphony:reviewing" \
          --repo "${{ github.repository }}" || true

    # ══════════════════════════════════════════════════════════════════════════
    # FIND — find open unclaimed issues and dispatch workers
    # ══════════════════════════════════════════════════════════════════════════

    - name: Find open unclaimed issues
      if: inputs.phrase == 'find'
      id: found_issues
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        chmod +x "${GITHUB_ACTION_PATH}/scripts/find-open-issues.sh"
        ISSUES=$(bash "${GITHUB_ACTION_PATH}/scripts/find-open-issues.sh")
        if [[ -n "$ISSUES" ]]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
          {
            echo "list<<EOF_LIST"
            echo "$ISSUES"
            echo "EOF_LIST"
          } >> "$GITHUB_OUTPUT"
          echo "Found open issues:" >&2
          echo "$ISSUES" >&2
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No open unclaimed issues found" >&2
        fi

    - name: Dispatch workers for found issues
      if: inputs.phrase == 'find' && steps.found_issues.outputs.found == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        DISPATCH_WF="${{ inputs.dispatch_workflow }}"
        if [[ -z "$DISPATCH_WF" ]]; then
          echo "No dispatch_workflow set — cannot dispatch workers. Set the dispatch_workflow input." >&2
          exit 0
        fi
        while IFS= read -r n; do
          [[ -z "$n" ]] && continue
          echo "Dispatching issue #${n}" >&2
          gh workflow run "$DISPATCH_WF" \
            --repo "${{ github.repository }}" \
            --field issue_number="${n}" \
            --field workflow_file="${{ inputs.workflow_file }}" || true
        done <<< "${{ steps.found_issues.outputs.list }}"

    # ══════════════════════════════════════════════════════════════════════════
    # FAILURE HANDLERS
    # ══════════════════════════════════════════════════════════════════════════

    - name: Handle dispatch failure
      if: failure() && inputs.phrase == 'dispatch'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue comment "${{ inputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --body "Symphony worker failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
        gh issue edit "${{ inputs.issue_number }}" \
          --add-label "symphony:failed" \
          --remove-label "symphony:in-progress" \
          --remove-label "symphony:claimed" \
          --repo "${{ github.repository }}" || true

    - name: Handle review failure
      if: failure() && inputs.phrase == 'review' && steps.pr_info.outputs.issue_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue comment "${{ steps.pr_info.outputs.issue_number }}" \
          --repo "${{ github.repository }}" \
          --body "Symphony review failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
        gh issue edit "${{ steps.pr_info.outputs.issue_number }}" \
          --add-label "symphony:failed" \
          --remove-label "symphony:reviewing" \
          --repo "${{ github.repository }}" || true
