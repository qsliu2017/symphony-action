name: Symphony CI + Review

# Runs on symphony PRs: validates workflow files, then triggers Claude review.
# In your own repo, replace the 'ci' job steps with your real test suite.

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    if: startsWith(github.head_ref, 'symphony/issue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML
        run: |
          pip install yq --quiet
          for f in .github/workflows/*.yml; do
            yq . "$f" > /dev/null && echo "OK: $f" || { echo "INVALID: $f"; exit 1; }
          done

      - name: Validate shell scripts
        run: bash -n scripts/*.sh && echo "Shell syntax OK"

  review:
    needs: ci
    if: startsWith(github.head_ref, 'symphony/issue-')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: qsliu2017/symphony-action@main
        with:
          phrase: review
          pr_number: ${{ github.event.pull_request.number }}
          workflow_file: WORKFLOW.md
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
