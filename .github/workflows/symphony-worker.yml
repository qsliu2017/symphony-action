name: Symphony Worker (reusable)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to implement"
        type: number
        required: true
      attempt:
        description: "Retry attempt number"
        type: number
        required: false
        default: 0
      workflow_file:
        description: "Path to WORKFLOW.md in the caller repo"
        type: string
        required: false
        default: "WORKFLOW.md"
  workflow_call:
    inputs:
      issue_number:
        description: "GitHub issue number to implement"
        type: number
        required: true
      attempt:
        description: "Retry attempt number"
        type: number
        required: false
        default: 0
      workflow_file:
        description: "Path to WORKFLOW.md in the caller repo"
        type: string
        required: false
        default: "WORKFLOW.md"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude.ai OAuth token (from `claude setup-token`)"
        required: false
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (alternative to CLAUDE_CODE_OAUTH_TOKEN)"
        required: false
      GH_PAT:
        description: "GitHub PAT with repo+workflow scope. Used for gh pr create so pull_request events fire and trigger CI. Falls back to GITHUB_TOKEN (but CI won't auto-trigger without a PAT)."
        required: false

concurrency:
  group: symphony-issue-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  work:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve Symphony scripts
        id: symphony
        run: |
          if [[ -f "$GITHUB_WORKSPACE/scripts/parse-workflow.sh" ]]; then
            SCRIPTS_DIR="$GITHUB_WORKSPACE/scripts"
          else
            git clone --depth=1 https://github.com/qsliu2017/symphony-action.git /tmp/_symphony
            SCRIPTS_DIR="/tmp/_symphony/scripts"
          fi
          chmod +x "$SCRIPTS_DIR"/*.sh
          echo "dir=$SCRIPTS_DIR" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Label issue as claimed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          gh issue edit "$ISSUE" --add-label "symphony:claimed" \
            --repo "${{ github.repository }}" || true
          sleep 2
          gh issue edit "$ISSUE" --add-label "symphony:in-progress" \
            --remove-label "symphony:claimed" --remove-label "symphony:todo" \
            --repo "${{ github.repository }}" || true

      - name: Parse WORKFLOW.md
        id: config
        run: |
          WORKFLOW_FILE="${{ inputs.workflow_file }}"
          if [[ ! -f "$WORKFLOW_FILE" ]]; then
            echo "WARNING: $WORKFLOW_FILE not found, using defaults" >&2
            echo "max_turns=20" >> "$GITHUB_OUTPUT"
            echo "claude_command=claude" >> "$GITHUB_OUTPUT"
            echo "claude_model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "complexity_threshold=auto" >> "$GITHUB_OUTPUT"
            echo "hook_before_run=" >> "$GITHUB_OUTPUT"
            echo "hook_after_run=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          eval "$(bash "${{ steps.symphony.outputs.dir }}/parse-workflow.sh" "$WORKFLOW_FILE")"
          echo "max_turns=${SYMPHONY_MAX_TURNS}" >> "$GITHUB_OUTPUT"
          echo "claude_command=${SYMPHONY_CLAUDE_COMMAND}" >> "$GITHUB_OUTPUT"
          echo "claude_model=${SYMPHONY_CLAUDE_MODEL}" >> "$GITHUB_OUTPUT"
          echo "complexity_threshold=${SYMPHONY_COMPLEXITY_THRESHOLD}" >> "$GITHUB_OUTPUT"
          {
            echo "hook_before_run<<EOF_HOOK"
            echo "${SYMPHONY_HOOK_BEFORE_RUN}"
            echo "EOF_HOOK"
          } >> "$GITHUB_OUTPUT"
          {
            echo "hook_after_run<<EOF_HOOK"
            echo "${SYMPHONY_HOOK_AFTER_RUN}"
            echo "EOF_HOOK"
          } >> "$GITHUB_OUTPUT"
          {
            echo "prompt_template<<EOF_PROMPT"
            echo "${SYMPHONY_PROMPT_TEMPLATE}"
            echo "EOF_PROMPT"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch issue details
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_JSON=$(gh issue view "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --json number,title,body,labels,url)
          echo "json<<EOF_JSON" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF_JSON" >> "$GITHUB_OUTPUT"
          TITLE=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Run before_run hook
        if: steps.config.outputs.hook_before_run != ''
        run: |
          bash -c "${{ steps.config.outputs.hook_before_run }}"

      - name: Assess issue complexity
        id: plan
        env:
          ISSUE_JSON: ${{ steps.issue.outputs.json }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYMPHONY_COMPLEXITY_THRESHOLD: ${{ steps.config.outputs.complexity_threshold }}
          SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
          SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PLAN=$(bash "${{ steps.symphony.outputs.dir }}/assess-and-plan.sh")
          echo "result<<EOF_PLAN" >> "$GITHUB_OUTPUT"
          echo "$PLAN" >> "$GITHUB_OUTPUT"
          echo "EOF_PLAN" >> "$GITHUB_OUTPUT"
          IS_COMPLEX=$(echo "$PLAN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('complex',False)).lower())")
          echo "complex=${IS_COMPLEX}" >> "$GITHUB_OUTPUT"

      - name: Create sub-issues if complex
        if: steps.plan.outputs.complex == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PLAN='${{ steps.plan.outputs.result }}'
          PARENT="${{ inputs.issue_number }}"
          REPO="${{ github.repository }}"

          python3 - "$PLAN" "$PARENT" "$REPO" <<'PYEOF'
          import sys
          import json
          import subprocess

          plan = json.loads(sys.argv[1])
          parent = sys.argv[2]
          repo = sys.argv[3]

          sub_issues = plan.get('sub_issues', [])
          if not sub_issues:
              print("No sub-issues to create")
              sys.exit(0)

          created = []
          for sub in sub_issues:
              result = subprocess.run(
                  ['gh', 'issue', 'create',
                   '--repo', repo,
                   '--title', sub['title'],
                   '--body', sub['body'] + f'\n\nPart of #' + parent,
                   '--label', 'symphony:todo'],
                  capture_output=True, text=True, check=True
              )
              issue_url = result.stdout.strip()
              issue_num = issue_url.rstrip('/').split('/')[-1]
              created.append((issue_num, sub['title']))
              print(f"Created sub-issue #{issue_num}: {sub['title']}")

          task_list = '\n\n## Sub-issues\n\n' + '\n'.join(
              f'- [ ] #{num} {title}' for num, title in created
          )
          subprocess.run(
              ['gh', 'issue', 'comment', parent,
               '--repo', repo,
               '--body', f'Symphony broke this issue into sub-tasks:{task_list}'],
              check=True
          )
          PYEOF

          gh issue edit "$PARENT" \
            --add-label "symphony:todo" \
            --remove-label "symphony:in-progress" \
            --repo "$REPO" || true

      - name: Create/checkout feature branch
        if: steps.plan.outputs.complex == 'false'
        run: |
          BRANCH="symphony/issue-${{ inputs.issue_number }}"
          git config user.name "Symphony Bot"
          git config user.email "symphony-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git push -u origin "$BRANCH" --force-with-lease || git push -u origin "$BRANCH"

      - name: Implement issue with Claude
        if: steps.plan.outputs.complex == 'false'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_JSON: ${{ steps.issue.outputs.json }}
          ATTEMPT: ${{ inputs.attempt }}
          SYMPHONY_PROMPT_TEMPLATE: ${{ steps.config.outputs.prompt_template }}
          SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
          SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bash "${{ steps.symphony.outputs.dir }}/implement-issue.sh"

      - name: Run after_run hook
        if: steps.plan.outputs.complex == 'false' && steps.config.outputs.hook_after_run != ''
        run: |
          bash -c "${{ steps.config.outputs.hook_after_run }}"

      - name: Check for changes
        if: steps.plan.outputs.complex == 'false'
        id: changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:" >&2
            git status --porcelain >&2
          fi

      - name: Commit and push changes
        if: steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "feat: implement issue #${{ inputs.issue_number }} - ${{ steps.issue.outputs.title }}"
          git push

      - name: Create pull request
        if: steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          # Use PAT if provided — PRs created with PAT trigger pull_request events so CI fires.
          # PRs created with GITHUB_TOKEN do NOT trigger CI (GitHub security restriction).
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          BRANCH="symphony/issue-${{ inputs.issue_number }}"
          TITLE="feat: ${{ steps.issue.outputs.title }}"
          BODY="Resolves #${{ inputs.issue_number }}

          Implemented by Symphony via Claude Code.

          ---
          *This PR was automatically created by [Symphony](https://github.com/${{ github.repository }}).*"

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base "main" \
            --title "$TITLE" \
            --body "$BODY") || \
          PR_URL=$(gh pr view "$BRANCH" --repo "${{ github.repository }}" --json url -q .url)

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "Created PR: ${PR_URL}" >&2

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "")
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

          # If no PAT was provided, CI won't auto-trigger — dispatch review directly.
          if [[ -z "${{ secrets.GH_PAT }}" ]]; then
            echo "No GH_PAT set — CI will not auto-trigger. Dispatching review directly after 30s..." >&2
            sleep 30
            gh workflow run symphony-review.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${PR_NUM}" \
              --field workflow_file="${{ inputs.workflow_file }}" || true
          fi

      - name: Comment on issue with PR link
        if: steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Symphony has opened a pull request: ${{ steps.pr.outputs.url }}"

      - name: Label issue pr-open
        if: steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ inputs.issue_number }}" \
            --add-label "symphony:pr-open" \
            --remove-label "symphony:in-progress" \
            --repo "${{ github.repository }}" || true

      - name: Retry or give up if no changes
        if: steps.plan.outputs.complex == 'false' && steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ATTEMPT="${{ inputs.attempt }}"
          MAX_TURNS="${{ steps.config.outputs.max_turns }}"
          MAX_TURNS="${MAX_TURNS:-5}"
          NEXT_ATTEMPT=$((ATTEMPT + 1))

          if [[ "$NEXT_ATTEMPT" -lt "$MAX_TURNS" ]]; then
            echo "No changes on attempt ${ATTEMPT}, retrying (${NEXT_ATTEMPT}/${MAX_TURNS})" >&2
            gh issue comment "${{ inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --body "Symphony made no changes on attempt ${ATTEMPT} — retrying (attempt ${NEXT_ATTEMPT})."
            gh issue edit "${{ inputs.issue_number }}" \
              --remove-label "symphony:in-progress" \
              --repo "${{ github.repository }}" || true
            gh workflow run symphony-worker.yml \
              --repo "${{ github.repository }}" \
              --field issue_number="${{ inputs.issue_number }}" \
              --field attempt="${NEXT_ATTEMPT}" \
              --field workflow_file="${{ inputs.workflow_file }}"
          else
            echo "Giving up after ${MAX_TURNS} attempts with no changes" >&2
            gh issue comment "${{ inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --body "Symphony made no changes after ${MAX_TURNS} attempts — marking as failed for human review."
            gh issue edit "${{ inputs.issue_number }}" \
              --add-label "symphony:failed" \
              --remove-label "symphony:in-progress" \
              --repo "${{ github.repository }}" || true
          fi

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "Symphony worker failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
          gh issue edit "${{ inputs.issue_number }}" \
            --add-label "symphony:failed" \
            --remove-label "symphony:in-progress" \
            --remove-label "symphony:claimed" \
            --repo "${{ github.repository }}" || true
