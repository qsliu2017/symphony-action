name: Symphony Review (reusable)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        type: number
        required: true
      workflow_file:
        description: "Path to WORKFLOW.md in the caller repo"
        type: string
        required: false
        default: "WORKFLOW.md"
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to review"
        type: number
        required: true
      workflow_file:
        description: "Path to WORKFLOW.md in the caller repo"
        type: string
        required: false
        default: "WORKFLOW.md"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude.ai OAuth token (from `claude setup-token`)"
        required: false
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (alternative to CLAUDE_CODE_OAUTH_TOKEN)"
        required: false

concurrency:
  group: symphony-pr-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write

    steps:
      - name: Fetch PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json number,title,headRefName,body,closingIssuesReferences)
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PR_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          BRANCH=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['headRefName'])")
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          ISSUE_NUM=$(echo "$PR_JSON" | python3 -c \
            'import sys,json; d=json.load(sys.stdin); refs=d.get("closingIssuesReferences",[]); print(refs[0]["number"] if refs else "")')
          echo "issue_number=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Resolve Symphony scripts
        id: symphony
        run: |
          if [[ -f "$GITHUB_WORKSPACE/scripts/parse-workflow.sh" ]]; then
            SCRIPTS_DIR="$GITHUB_WORKSPACE/scripts"
          else
            git clone --depth=1 https://github.com/qsliu2017/symphony-action.git /tmp/_symphony
            SCRIPTS_DIR="/tmp/_symphony/scripts"
          fi
          chmod +x "$SCRIPTS_DIR"/*.sh
          echo "dir=$SCRIPTS_DIR" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Parse WORKFLOW.md
        id: config
        run: |
          WORKFLOW_FILE="${{ inputs.workflow_file }}"
          if [[ ! -f "$WORKFLOW_FILE" ]]; then
            echo "max_turns=5" >> "$GITHUB_OUTPUT"
            echo "claude_command=claude" >> "$GITHUB_OUTPUT"
            echo "claude_model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          eval "$(bash "${{ steps.symphony.outputs.dir }}/parse-workflow.sh" "$WORKFLOW_FILE")"
          echo "max_turns=${SYMPHONY_MAX_TURNS}" >> "$GITHUB_OUTPUT"
          echo "claude_command=${SYMPHONY_CLAUDE_COMMAND}" >> "$GITHUB_OUTPUT"
          echo "claude_model=${SYMPHONY_CLAUDE_MODEL}" >> "$GITHUB_OUTPUT"

      - name: Fetch linked issue details
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ steps.pr_info.outputs.issue_number }}"
          if [[ -n "$ISSUE_NUM" ]]; then
            ISSUE_JSON=$(gh issue view "$ISSUE_NUM" \
              --repo "${{ github.repository }}" \
              --json number,title,body,labels || echo "{}")
          else
            ISSUE_JSON="{}"
          fi
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Label issue as reviewing
        if: steps.pr_info.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ steps.pr_info.outputs.issue_number }}" \
            --add-label "symphony:reviewing" \
            --remove-label "symphony:pr-open" \
            --repo "${{ github.repository }}" || true

      - name: Configure git
        run: |
          git config user.name "Symphony Bot"
          git config user.email "symphony-bot@users.noreply.github.com"

      - name: Run review
        id: review
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_JSON: ${{ steps.issue.outputs.json }}
          SYMPHONY_CLAUDE_COMMAND: ${{ steps.config.outputs.claude_command }}
          SYMPHONY_CLAUDE_MODEL: ${{ steps.config.outputs.claude_model }}
          SYMPHONY_MAX_TURNS: ${{ steps.config.outputs.max_turns }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          bash "${{ steps.symphony.outputs.dir }}/review-pr.sh"
          echo "passed=true" >> "$GITHUB_OUTPUT"

      - name: Merge PR
        if: steps.review.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --auto || \
          gh pr merge "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch

      - name: Trigger post-merge workflow
        if: steps.review.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run symphony-post-merge.yml \
            --repo "${{ github.repository }}" \
            --field workflow_file="${{ inputs.workflow_file }}" || true

      - name: Label issue done
        if: steps.pr_info.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ steps.pr_info.outputs.issue_number }}" \
            --add-label "symphony:done" \
            --remove-label "symphony:reviewing" \
            --repo "${{ github.repository }}" || true

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ steps.pr_info.outputs.issue_number }}"
          if [[ -n "$ISSUE_NUM" ]]; then
            gh issue comment "$ISSUE_NUM" \
              --repo "${{ github.repository }}" \
              --body "Symphony review failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
            gh issue edit "$ISSUE_NUM" \
              --add-label "symphony:failed" \
              --remove-label "symphony:reviewing" \
              --repo "${{ github.repository }}" || true
          fi
